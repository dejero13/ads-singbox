name: Обновить ads-singbox (всегда один релиз)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# ←←←←←←←←←←←←←←←←←←←←←←←←←←
permissions:
  contents: write
# ←←←←←←←←←←←←←←←←←←←←←←←←←←

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Скачать sing-box.zip из Latest релиза
        uses: robinraju/release-downloader@v1
        with:
          repository: runetfreedom/russia-v2ray-rules-dat
          latest: true
          fileName: sing-box.zip
          extract: false

      - name: Распаковать и извлечь файл
        run: |
          unzip -o sing-box.zip
          mv rule-set-geosite/geosite-category-ads-all.srs ./geosite-category-ads-all.srs || echo "Файл не найден"
          rm -rf rule-set-geosite rule-set-geoip sing-box.zip

      - name: Коммит и пуш изменений
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "Файл не изменился — пропускаем"
          else
            git add geosite-category-ads-all.srs
            git commit -m "Обновлён geosite-category-ads-all.srs из Latest релиза"
            git push
          fi

      - name: Удалить старый релиз "latest"
        continue-on-error: true
        run: gh release delete latest --yes || echo "Релиз не найден"

      - name: Создать новый релиз "latest"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest Release" \
            --notes "Автоматическое обновление geosite-category-ads-all.srs" \
            --latest \
            geosite-category-ads-all.srs
