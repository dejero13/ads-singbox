name: Обновить ads-singbox (всегда один релиз)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Скачать sing-box.zip из Latest релиза
        uses: robinraju/release-downloader@v1
        with:
          repository: runetfreedom/russia-v2ray-rules-dat
          latest: true
          fileName: sing-box.zip
          extract: false

      - name: Распаковать и извлечь файл
        run: |
          unzip -o sing-box.zip
          mv rule-set-geosite/geosite-category-ads-all.srs ./geosite-category-ads-all.srs || echo "Файл не найден"
          rm -rf rule-set-geosite rule-set-geoip sing-box.zip

      - name: Обновить README.md с датой
        run: |
          DATE=$(date +"%d.%m.%Y %H:%M UTC")
          cat > README.md << EOF
          # Обновляемый geosite-category-ads-all.srs для sing-box

          **Последнее обновление:** ${DATE}

          Файл автоматически обновляется каждый день из источника [runetfreedom/russia-v2ray-rules-dat](https://github.com/runetfreedom/russia-v2ray-rules-dat).

          ### Прямая ссылка для скачивания:
          [geosite-category-ads-all.srs](https://github.com/dejero13/ads-singbox/releases/download/latest/geosite-category-ads-all.srs)

          ### Как использовать в sing-box:
          \`\`\`json
          {
            "route": {
              "rule_set": [
                {
                  "type": "local",
                  "tag": "ads",
                  "format": "binary",
                  "path": "./geosite-category-ads-all.srs"
                }
              ]
            }
          }
          \`\`\`
          EOF

      - name: Коммит и пуш изменений
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "Файл не изменился — пропускаем"
          else
            git add geosite-category-ads-all.srs README.md
            git commit -m "Обновлён geosite-category-ads-all.srs (${DATE})"
            git push
          fi

      - name: Полностью очистить старый релиз и тег "latest"
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag --yes || echo "Релиз не найден"
          git tag -d latest 2>/dev/null || true
          git push origin --delete refs/tags/latest 2>/dev/null || true
          sleep 3

      - name: Создать новый релиз "latest"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest Release" \
            --notes "Обновление от $(date +"%d.%m.%Y %H:%M UTC")" \
            --latest \
            geosite-category-ads-all.srs
